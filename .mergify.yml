queue_rules:
  - name: default
    # Retry once on flaky CI — Mergify recreates the draft PR for a fresh run.
    # This is what makes the planted flaky test on PR1 self-heal on stage.
    max_checks_retries: 1
    # Batch up to 5 queued PRs into a single CI run. With Depends-On stacks,
    # Mergify merges batched PRs in dependency order with one shared CI run
    # — three queue beats collapse into one. batch_max_wait_time keeps the
    # window short so a lone PR doesn't sit idle.
    batch_size: 5
    batch_max_wait_time: 30 s
    queue_conditions:
      - check-success=typecheck
      - check-success=lint
      - check-success=test_api
      - check-success=test_web
      - check-success=build
    merge_conditions:
      - check-success=typecheck
      - check-success=lint
      - check-success=test_api
      - check-success=test_web
      - check-success=build
    merge_method: squash
